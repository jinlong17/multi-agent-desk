name: Bug report
description: Record a reproducible MultiAgentDesk defect for diagnosis
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: environment
    attributes:
      label: Environment and versions
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and sanitized evidence
    validations:
      required: true
  - type: textarea
    id: regression
    attributes:
      label: Suspected regression range or affected module
