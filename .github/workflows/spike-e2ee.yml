name: E2EE protocol vectors

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/spike-e2ee.yml"
      - "docs/spikes/e2ee/**"
      - "docs/workflow/features/spike-e2ee-protocol-vectors/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/spike-e2ee.yml"
      - "docs/spikes/e2ee/**"
      - "docs/workflow/features/spike-e2ee-protocol-vectors/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2ee-vectors-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  vectors:
    name: e2ee-vectors-${{ matrix.id }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: ubuntu
            os: ubuntu-latest
          - id: macos
            os: macos-latest
          - id: windows
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup pnpm
        uses: pnpm/action-setup@d15e628ca66d93ee5f352c71671a7bc6a97af5c9 # v6.0.8
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: .go-version
          cache-dependency-path: docs/spikes/e2ee/go/go.sum
      - name: Install exact TypeScript dependencies
        run: pnpm --dir docs/spikes/e2ee/typescript install --frozen-lockfile --ignore-workspace
      - name: Compare Go and TypeScript vectors
        run: node docs/spikes/e2ee/verify.mjs
